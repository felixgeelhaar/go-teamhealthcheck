version: 1
language: go
policy:
  default:
    min: 0
  domains:
    - name: cmd
      match:
        - ./cmd/...
      min: 0
    - name: auth
      match:
        - ./internal/auth/...
      min: 95
    - name: domain
      match:
        - ./internal/domain/...
      min: 90
    - name: mcp
      match:
        - ./internal/mcp/...
      min: 65
    - name: mcpui
      match:
        - ./internal/mcpui/...
      min: 80
    - name: seed
      match:
        - ./internal/seed/...
      min: 95
    - name: storage
      match:
        - ./internal/storage/...
      min: 55
    - name: events
      match:
        - ./internal/events/...
      min: 80
    - name: dashboard
      match:
        - ./internal/dashboard/...
      min: 15
